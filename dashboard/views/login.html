<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gapat Bot — Login</title>
<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
 @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
 .login-glow { position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);opacity:.12;pointer-events:none; }
 @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
 @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
 .login-card { animation:fadeUp .6s ease; }
 .login-btn { transition:all .25s ease; position:relative; overflow:hidden; }
 .login-btn::after { content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);transform:translateX(-100%);transition:transform .6s; }
 .login-btn:hover::after { transform:translateX(100%); }
 .login-btn:hover { transform:translateY(-2px);box-shadow:0 12px 40px rgba(99,102,241,.35); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:radial-gradient(ellipse at 30% 20%, #1e1b4b 0%, #030712 70%);font-family:'Inter',system-ui,sans-serif">
 <div class="login-glow" style="background:#6366f1;top:-100px;left:10%"></div>
 <div class="login-glow" style="background:#a855f7;bottom:-150px;right:10%"></div>

 <div class="login-card relative w-full max-w-sm">
 <div class="rounded-2xl p-8 sm:p-10 text-center" style="background:rgba(17,24,39,.7);border:1px solid rgba(99,102,241,.15);backdrop-filter:blur(16px);box-shadow:0 24px 80px rgba(0,0,0,.4)">
 <div class="w-16 h-16 mx-auto mb-5 rounded-2xl flex items-center justify-center" style="background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25)">
 <i class="fab fa-discord text-3xl" style="color:#818cf8"></i>
 </div>
 <h1 class="text-2xl font-extrabold mb-1" style="color:var(--text-primary)">Gapat Bot</h1>
 <p class="text-sm mb-8" style="color:var(--text-muted)">Login with Discord to manage your server</p>
 <a href="/api/auth/discord" class="login-btn inline-flex items-center justify-center gap-3 w-full px-6 py-3.5 rounded-xl text-white font-semibold text-sm" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">
 <i class="fab fa-discord text-lg"></i>
 <span>Login with Discord</span>
 </a>
 <div class="mt-6 pt-6 border-t" style="border-color:var(--border-color)">
 <a href="/" class="text-xs inline-flex items-center gap-1.5" style="color:var(--text-muted)">
 <i class="fas fa-arrow-left"></i>
 <span>Back to Home</span>
 </a>
 </div>
 </div>
 </div>
</body>
</html>
